<script>
let bakiye = 547000;

let taksitler = [
  {tarih: "2026-04-28", tutar:125000},
  {tarih: "2026-05-01", tutar:320000},
  {tarih: "2026-05-10", tutar:432000}
];

function bugun() {
  return new Date("2026-05-15"); // test tarihi
}

function hesapla() {
  let kalan = bakiye;
  let borc = 0;

  // sırala
  taksitler.sort((a,b)=> new Date(a.tarih) - new Date(b.tarih));

  for(let t of taksitler){
    if(new Date(t.tarih) <= bugun()){
      if(kalan >= t.tutar){
        kalan -= t.tutar;
      } else {
        borc += (t.tutar - kalan);
        kalan = 0;
      }
    }
  }

  return {kalan, borc};
}

function goster(){
  let sonuc = hesapla();

  document.getElementById("bakiye").innerText =
    sonuc.kalan > 0 ? "₺ " + sonuc.kalan : "-₺ " + sonuc.borc;
}

// PARA GELİNCE
function gelirEkle(){
  let miktar = prompt("Ne kadar geldi?");
  if(miktar){
    bakiye += Number(miktar);
    goster();
  }
}
</script>
