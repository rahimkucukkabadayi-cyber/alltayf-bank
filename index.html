<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Alltayf Bank</title>

<style>
body {
  margin:0;
  font-family: Arial;
}

/* ÜST BAR */
.topbar {
  background:#d60000;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu {
  display:flex;
  gap:20px;
}

.menu a {
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* HEADER */
.header {
  background:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo {
  font-size:22px;
  font-weight:bold;
  color:#d60000;
}

.buttons button {
  margin-left:10px;
  padding:10px 15px;
  border-radius:20px;
  border:1px solid #d60000;
  background:white;
  color:#d60000;
  cursor:pointer;
}

.buttons button.red {
  background:#d60000;
  color:white;
}

/* SLIDER */
.slider {
  background:#d60000;
  color:white;
  display:flex;
  padding:40px;
  align-items:center;
  justify-content:space-between;
}

.slider-text {
  max-width:50%;
}

.slider-text h1 {
  font-size:36px;
}

.slider-text button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  margin-top:20px;
  cursor:pointer;
}

.slider-image {
  width:300px;
  height:200px;
  background:white;
  border-radius:10px;
}

/* ALT KARTLAR */
.cards {
  display:flex;
  gap:20px;
  padding:20px;
}

.card {
  flex:1;
  background:#f5f5f5;
  padding:20px;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="topbar">
  <div class="menu">
    <a href="#">Süper Şube</a>
    <a href="#">Ticaret Yolu</a>
  </div>
  <div class="menu">
    <a href="#">Kampanyalar</a>
    <a href="#">Bankamız</a>
  </div>
</div>

<div class="header">
  <div class="logo">ALLTAYF BANK</div>

  <div class="menu">
    <a href="#">Bireysel</a>
    <a href="#">Ticari</a>
    <a href="#">Kurumsal</a>
  </div>

  <div class="buttons">
    <button>İnternet Şubesi</button>
    <button class="red">Müşteri Ol</button>
  </div>
</div>

<div class="slider">
  <div class="slider-text">
    <h1>BİRLİKTE DAHA FAZLASINI BAŞARACAĞIZ</h1>
    <button>Detaylı Bilgi</button>
  </div>

  <div class="slider-image"></div>
</div>

<div class="cards">
  <div class="card">
    <h3>Bireysel Bankacılık</h3>
    <p>Hesap, kredi, kart işlemleri</p>
  </div>

  <div class="card">
    <h3>Ticari Bankacılık</h3>
    <p>İşletmeler için çözümler</p>
  </div>

  <div class="card">
    <h3>Dijital Bankacılık</h3>
    <p>Mobil ve internet işlemleri</p>
  </div>
</div>

</body>
</html>
