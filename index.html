<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Alltayf Bank</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    .header {
      background: #020617;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .card {
      background: #1e293b;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">ALLTAYF BANK</div>

<div class="card">
  <h3>Bakiye</h3>
  <p>₺ 10,000</p>
  <button>Para Gönder</button>
</div>

<div class="card">
  <h3>Son İşlemler</h3>
  <p>+ ₺500 (Geldi)</p>
  <p>- ₺200 (Gitti)</p>
</div>

</body>
</html>
